spark.sql.extensions                     org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# Iceberg catalog "lake" -> Hive Metastore (same catalog the Kafka sink writes to)
spark.sql.catalog.lake                   org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lake.type              hive
spark.sql.catalog.lake.uri               thrift://hive-metastore:9083
spark.sql.catalog.lake.warehouse         s3a://warehouse/lakehouse
spark.sql.catalog.lake.io-impl           org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.lake.s3.endpoint       http://minio:9000
spark.sql.catalog.lake.s3.path-style-access true

spark.sql.defaultCatalog                 lake

# s3a fallback (used by Hive/Hadoop codepaths)
spark.hadoop.fs.s3a.endpoint             http://minio:9000
spark.hadoop.fs.s3a.access.key           minioadmin
spark.hadoop.fs.s3a.secret.key           minioadmin
spark.hadoop.fs.s3a.path.style.access    true
spark.hadoop.fs.s3a.connection.ssl.enabled false

spark.ui.enabled                         false
